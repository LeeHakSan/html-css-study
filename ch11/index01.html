<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        /* 박스 크기를 계산하는 기준(기본값은 content-box) */
        box-sizing: border-box;
      }
      .box {
        width: 200px;
        height: 100px;
        background-color: lightblue;
      }

      /* 주요 속성 padding */
      .box {
        padding: 20px;
      }
      /* 주요 속성 border */
      .box {
        border: 10px solid black;
      }
      .box {
        margin: 20px;
      }
    </style>
  </head>
  <body>
    <div class="box">태그 1 박스 모델</div>
    <div>태그 2</div>
    <hr />
    <div>
      <pre>
    요소 크기 계산 해보기
    전체 너비 = width + 좌우 padding + 좌우 너비
    전체 높이 = height + 상하 padding + 좌우 border
  </pre
      >
    </div>
  </body>
</html>
