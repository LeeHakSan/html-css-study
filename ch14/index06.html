<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        display: flex;
        border: 2px solid greenyellow;
        padding: 20px;
      }

      .item {
        height: 100px;
        margin: 10px;
        border: 2px solid black;
        background-color: yellow;
        border-radius: 10px;
        text-align: center;
        line-height: 100px;
        flex-grow: 1;
      }
      .item1 {
        /* flex-grow: 0;
        flex-shrink: 1;
        flex-basis: 100px; */
        /* 위 세 개의 단축 속성 */
        flex: 0 1 100px;
      }
      .item2 {
        /* flex-grow: 0;
        flex-shrink: 1;
        flex-basis: 50px; */
        flex: 0 1 50px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item item1">1</div>
      <div class="item item2">2</div>
    </div>
  </body>
</html>
